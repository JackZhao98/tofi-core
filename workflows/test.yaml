name: "防重运行验证工作流"
nodes:
  # 节点 A：干扰项
  trigger_node:
    id: "trigger_node"
    type: "shell"
    config:
      script: "echo '我是节点 A，我正在尝试二次触发目标节点...' && sleep 1"
    # 这里故意指向 target_node
    next: ["target_node"]

  # 节点 B：目标检测项
  target_node:
    id: "target_node"
    type: "shell"
    # 【关键】：故意不写 dependencies，让 main.go 认为它是入口节点，从而主动启动它
    config:
      script: "echo '🎯 目标节点执行成功！'"