name: Read File
description: 读取文本文件内容（仅限相对路径，禁止访问系统文件）

nodes:
  validate_path:
    type: shell
    input:
      script: |
        # 🔒 安全检查：只允许相对路径，禁止绝对路径和路径遍历
        case "$INPUT_PATH" in
          /*)
            echo "Error: 绝对路径被禁止。请使用相对路径"
            exit 1
            ;;
          *..*)
            echo "Error: 路径中不允许包含 '..'（路径遍历攻击）"
            exit 1
            ;;
          ~*)
            echo "Error: 不允许使用 ~ 符号"
            exit 1
            ;;
        esac

        # 直接返回相对路径（允许读取工作目录下的所有文件）
        echo "$INPUT_PATH"
    env:
      INPUT_PATH: "{{inputs.path}}"
    next: ["read"]

  read:
    type: shell
    input:
      script: |
        # 检查文件是否存在
        if [ ! -f "$FILE_PATH" ]; then
          echo "Error: 文件不存在 - $FILE_PATH"
          exit 1
        fi

        # 检查文件是否可读
        if [ ! -r "$FILE_PATH" ]; then
          echo "Error: 文件无法读取 - $FILE_PATH (权限不足)"
          exit 1
        fi

        # 读取文件内容
        cat "$FILE_PATH" 2>&1 || {
          echo "Error: 无法读取文件 - $FILE_PATH"
          exit 1
        }
    env:
      FILE_PATH: "{{validate_path}}"
    dependencies: ["validate_path"]
